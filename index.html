<!DOCTYPE html>
<html lang="en-ZA" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050508" />
  <meta name="description" content="Watch Hub — live show tracker with seasons, hours watched, rewatches & multi-platform Top 10s." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Watch Hub · Neon Deck</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎞</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="orb orb-a" aria-hidden="true"></div>
  <div class="orb orb-b" aria-hidden="true"></div>

  <div class="shell">
    <header class="marquee">
      <div class="marquee-left">
        <button type="button" class="dock-ghost mobile-only" id="mobile-menu" aria-label="Menu">☰</button>
        <div class="logo-mark">
          <span class="logo-reel" aria-hidden="true">🎞</span>
          <div>
            <p class="logo-kicker">NEON DECK</p>
            <h1 class="logo-title">Watch Hub</h1>
          </div>
        </div>
      </div>

      <div class="search-shell">
        <span class="search-glyph" aria-hidden="true">⌕</span>
        <input
          type="search"
          id="global-search"
          class="search-field"
          placeholder="Search the live grid…"
          autocomplete="off"
          enterkeyhint="search"
        />
        <kbd class="kbd">/</kbd>
      </div>

      <div class="marquee-right">
        <span id="live-pill" class="pill pill-live">LIVE</span>
        <span class="pill pill-user" id="sidebar-user">Connor</span>
        <button type="button" class="btn-acid" id="btn-add-title">+ LOG</button>
        <button type="button" class="icon-round" id="theme-toggle" title="Theme" aria-label="Toggle theme">◐</button>
      </div>
    </header>

    <!-- Global multi-select platforms (filters junk) -->
    <section class="platform-bar" aria-label="Platform filter">
      <div class="platform-bar-label">
        <span>YOUR SIGNALS</span>
        <button type="button" class="text-btn" id="platforms-all">All</button>
        <button type="button" class="text-btn" id="platforms-mine">Mine</button>
        <button type="button" class="text-btn" id="platforms-none">Clear</button>
      </div>
      <div class="platform-chips" id="platform-chips"></div>
    </section>

    <div class="layout">
      <aside class="rail" id="side-rail" aria-label="Navigation">
        <nav class="rail-nav" id="main-nav">
          <button type="button" class="rail-btn active" data-view="home"><i>◈</i><span>Deck</span></button>
          <button type="button" class="rail-btn" data-view="top10"><i>▲</i><span>Top 10</span></button>
          <button type="button" class="rail-btn" data-view="discover"><i>◎</i><span>Browse</span></button>
          <button type="button" class="rail-btn" data-view="new"><i>⚡</i><span>Airing</span></button>
          <button type="button" class="rail-btn" data-view="watchlist"><i>◇</i><span>Queue</span><em class="rail-count" id="badge-watchlist" hidden>0</em></button>
          <button type="button" class="rail-btn" data-view="watching"><i>▶</i><span>Watching</span><em class="rail-count" id="badge-watching" hidden>0</em></button>
          <button type="button" class="rail-btn" data-view="seen"><i>✓</i><span>Seen</span></button>
          <button type="button" class="rail-btn" data-view="reviews"><i>★</i><span>Takes</span></button>
          <button type="button" class="rail-btn" data-view="stats"><i>▤</i><span>Hours</span></button>
          <button type="button" class="rail-btn" data-view="platforms"><i>▤</i><span>Streams</span></button>
          <button type="button" class="rail-btn" data-view="settings"><i>⚙</i><span>Setup</span></button>
        </nav>
      </aside>

      <main id="main" class="stage"></main>
    </div>

    <!-- Mobile bottom dock -->
    <nav class="bottom-dock" id="bottom-dock" aria-label="Quick nav">
      <button type="button" class="dock-btn active" data-view="home"><span>◈</span>Deck</button>
      <button type="button" class="dock-btn" data-view="top10"><span>▲</span>Top10</button>
      <button type="button" class="dock-btn" data-view="discover"><span>◎</span>Browse</button>
      <button type="button" class="dock-btn" data-view="watching"><span>▶</span>Now</button>
      <button type="button" class="dock-btn" data-view="stats"><span>▤</span>Hours</button>
    </nav>
  </div>

  <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>

  <div id="modal-root" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="sheet-top">
        <h2 id="modal-title">Title</h2>
        <button type="button" class="icon-round" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="sheet-body" id="modal-body"></div>
      <div class="sheet-foot" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden role="status"></div>

  <script src="live.js"></script>
  <script src="app.js"></script>
</body>
</html>
